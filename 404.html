<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#030309">
<title>404 — Lyra AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Outfit:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #030309; color: #f0f0ff;
    font-family: 'Outfit', system-ui, sans-serif; text-align: center; padding: 24px;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 68% 15%, rgba(0,200,150,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 30%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 45%, rgba(34,211,238,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,.3) 0%, transparent 100%);
  }
  .content { position: relative; z-index: 1; }
  h1 {
    font-family: 'Cormorant Garamond', serif; font-size: 96px; font-weight: 300;
    letter-spacing: 8px; color: #00c896; margin-bottom: 8px;
  }
  p { font-size: 16px; color: #8888b0; margin-bottom: 32px; line-height: 1.6; }
  a {
    display: inline-block; padding: 14px 32px;
    background: #00c896; color: #020a07; border-radius: 12px;
    font-weight: 600; font-size: 15px; text-decoration: none;
    box-shadow: 0 0 40px rgba(0,200,150,0.3);
    transition: transform 0.15s;
  }
  a:hover { transform: translateY(-2px); }
</style>
</head>
<body>
  <div class="content">
    <h1>404</h1>
    <p>This page has drifted beyond the constellation.<br>Let's get you back to Lyra.</p>
    <a href="./">← Back to Lyra AI</a>
  </div>
</body>
</html>
